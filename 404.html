<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - FLYTECH</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1><span class="logo-highlight">FLY</span>TECH</h1>
                <p class="tagline">Leading FTTH & Telecom Solutions</p>
            </div>
        </div>
    </header>

    <main class="container" style="text-align: center; padding: 100px 20px;">
        <i class="fas fa-exclamation-triangle" style="font-size: 80px; color: #ffc107; margin-bottom: 30px;"></i>
        <h1 style="font-size: 48px; margin-bottom: 20px;">404 - Page Not Found</h1>
        <p style="font-size: 18px; color: #666; margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto;">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="/" class="btn-primary" style="display: inline-block;">Back to Homepage</a>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="currentYear"></span> HANGZHOU FLY TECHNOLOGY CO., LTD. All rights reserved.</p>
            <p>Professional FTTH & Telecom Equipment Supplier</p>
        </div>
    </footer>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
